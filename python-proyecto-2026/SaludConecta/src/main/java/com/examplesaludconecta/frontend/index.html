<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaludConecta</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="login-container" id="loginSection">
    <section class="login-card">
      <h1>SaludConecta</h1>
      <p class="subtitle">Sistema de gestión médica</p>

      <form id="loginForm">
        <label for="email">Correo electrónico</label>
        <input 
          type="email" 
          id="email" 
          placeholder="admin@gmail.com" 
          required 
        />

        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          placeholder="Ingrese su contraseña" 
          required 
        />

        <button type="submit">Iniciar sesión</button>
      </form>

      <p id="mensaje" class="mensaje"></p>
    </section>
  </main>

  <section class="dashboard" id="dashboardSection">
    <header class="dashboard-header">
      <div>
        <h1>Panel SaludConecta</h1>
        <p id="usuarioActivo"></p>
      </div>
      <button id="logoutBtn" class="logout-btn">Cerrar sesión</button>
    </header>

    <div class="dashboard-content">
      <h2>Bienvenido/a al sistema</h2>
      <p>Desde este panel podrás gestionar pacientes y consultar información del sistema.</p>
     
      <section id="registroPacienteSection" class="form-section">
  <h2>Registrar paciente</h2>

  <form id="pacienteForm">
    <label for="nombrePaciente">Nombre</label>
    <input type="text" id="nombrePaciente" required>

    <label for="apellidoPaciente">Apellido</label>
    <input type="text" id="apellidoPaciente" required>

    <label for="rutPaciente">RUT</label>
    <input type="text" id="rutPaciente" required>

    <label for="correoPaciente">Correo</label>
    <input type="email" id="correoPaciente" required>

    <label for="telefonoPaciente">Teléfono</label>
    <input type="text" id="telefonoPaciente" required>

    <button type="submit">Guardar paciente</button>
  </form>

  <p id="mensajeRegistro"></p>
</section>
<section id="pacientesSection" class="pacientes-section">
  <h2>Listado de pacientes</h2>
  <p id="mensajePacientes"></p>
  <table id="tablaPacientes">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>RUT</th>
        <th>Correo</th>
        <th>Teléfono</th>
      </tr>
    </thead>
    <tbody id="tbodyPacientes">
    </tbody>
  </table>
</section>
      <div class="dashboard-actions">
        <button id="btnVerPacientes">Ver pacientes</button>
        <button id="btnRegistrarPaciente">Registrar paciente</button>
      </div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
