server:
  port: 8090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: saludconecta-pacientes
              uri: http://localhost:8080
              predicates:
                - Path=/api/pacientes/**

            - id: saludconecta-medicos
              uri: http://localhost:8080
              predicates:
                - Path=/api/medicos/**

            - id: saludconecta-tratamientos
              uri: http://localhost:8080
              predicates:
                - Path=/api/tratamientos/**

            - id: saludconecta-test-conexion
              uri: http://localhost:8080
              predicates:
                - Path=/api/test-conexion/**

            - id: usuarios
              uri: http://localhost:8081
              predicates:
                - Path=/api/usuarios/**

            - id: citas
              uri: http://localhost:8082
              predicates:
                - Path=/api/citas/**

            - id: especialidades
              uri: http://localhost:8083
              predicates:
                - Path=/api/especialidades/**

            - id: recetas
              uri: http://localhost:8084
              predicates:
                - Path=/api/recetas/**

            - id: historial-clinico
              uri: http://localhost:8085
              predicates:
                - Path=/api/historiales-clinicos/**

            - id: diagnosticos
              uri: http://localhost:8086
              predicates:
                - Path=/api/diagnosticos/**

            - id: notificaciones
              uri: http://localhost:8087
              predicates:
                - Path=/api/notificaciones/**

            - id: examenes
              uri: http://localhost:8088
              predicates:
                - Path=/api/examenes/**

            - id: pagos
              uri: http://localhost:8089
              predicates:
                - Path=/api/pagos/**

management:
  endpoints:
    web:
      exposure:
        include: health,info